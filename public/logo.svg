<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-labelledby="tkTitle">
  <title id="tkTitle">TinyKit</title>
  <defs>
    <linearGradient id="bg" x1="8" y1="0" x2="56" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5AC8FA"/>
      <stop offset="0.55" stop-color="#0071E3"/>
      <stop offset="1" stop-color="#0055B3"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Soft highlight -->
  <rect x="4" y="4" width="56" height="28" rx="12" fill="#fff" opacity="0.12"/>

  <!-- Open kit box -->
  <path
    fill="#fff"
    d="M14 28.5c0-1.4 1.1-2.5 2.5-2.5h31c1.4 0 2.5 1.1 2.5 2.5V46c0 2.2-1.8 4-4 4H18c-2.2 0-4-1.8-4-4V28.5Z"
  />
  <path
    fill="#fff"
    opacity="0.92"
    d="M16.5 26h31c.6 0 1.1-.2 1.5-.6L44.2 18c-.4-.5-1-.8-1.7-.8H21.5c-.7 0-1.3.3-1.7.8L15 25.4c.4.4.9.6 1.5.6Z"
  />

  <!-- Tools peeking from kit: screwdriver + wrench head -->
  <rect x="24" y="14" width="3.5" height="16" rx="1.75" fill="#0071E3"/>
  <rect x="22.5" y="12" width="6.5" height="4" rx="1.5" fill="#0055B3"/>

  <path
    fill="#0071E3"
    d="M36.5 15.5a4 4 0 0 1 5.7 5.7l-6.4 6.4-2.5-2.5 6.4-6.4a.75.75 0 0 0-1.1-1.1l-1.2 1.2-2.1-2.1 1.2-1.2Z"
  />
  <circle cx="41.2" cy="16.8" r="1.35" fill="#5AC8FA"/>

  <!-- Tiny latch -->
  <rect x="29.5" y="40" width="5" height="3.5" rx="1.2" fill="#0071E3"/>
</svg>
